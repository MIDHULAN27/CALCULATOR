<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <!-- Link to external stylesheet for all UI styling -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main container for the calculator UI -->
    <div class="calculator">
        <!-- Input field acting as the calculator's display screen. Disabled to prevent manual typing -->
        <input type="text" id="display" disabled>
        
        <!-- Grid container for all the calculator buttons -->
        <div class="button-grid">
            <!-- First Row: Function buttons and division -->
            <button class="btn func" data-value="C">C</button>
            <button class="btn func" data-value="+/-">+/-</button>
            <button class="btn func" data-value="%">%</button>
            <button class="btn op" data-value="/">/</button>

            <!-- Second Row: Numbers and multiplication -->
            <button class="btn num" data-value="7">7</button>
            <button class="btn num" data-value="8">8</button>
            <button class="btn num" data-value="9">9</button>
            <button class="btn op" data-value="*">*</button>

            <!-- Third Row: Numbers and subtraction -->
            <button class="btn num" data-value="4">4</button>
            <button class="btn num" data-value="5">5</button>
            <button class="btn num" data-value="6">6</button>
            <button class="btn op" data-value="-">-</button>

            <!-- Fourth Row: Numbers and addition -->
            <button class="btn num" data-value="1">1</button>
            <button class="btn num" data-value="2">2</button>
            <button class="btn num" data-value="3">3</button>
            <button class="btn op" data-value="+">+</button>

            <!-- Fifth Row: Zero button spans two columns, decimal, and equals -->
            <button class="btn num zero" data-value="0">0</button>
            <button class="btn num" data-value=".">.</button>
            <button class="btn equals" data-value="=">=</button>
        </div>
    </div>
    
    <!-- Link to external JavaScript file for interactivity -->
    <script src="script.js"></script>
</body>
</html>
